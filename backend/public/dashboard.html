<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Lounge | Backend Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #DC2626;
            --bg: #030712;
            --card: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f9fafb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent),
                              radial-gradient(circle at bottom left, #450a0a, transparent);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--primary);
            text-transform: uppercase;
        }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .dashboard-grid.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .stat-card {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--primary);
            opacity: 0.5;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .table-name {
            font-size: 0.875rem;
            font-weight: 600;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .row-count {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .card-footer {
            font-size: 0.75rem;
            color: #6b7280;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .controls {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        select {
            background: var(--card);
            border: 1px solid var(--border);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            outline: none;
            cursor: pointer;
        }

        @media (max-width: 640px) {
            body { padding: 1rem; }
            header { flex-direction: column; gap: 1rem; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Travel Lounge <span style="color: white; font-weight: 300;">Engine</span></div>
            <div class="status-badge" id="last-updated">System Operational</div>
        </header>

        <div class="controls">
            <span style="font-size: 0.875rem; color: #9ca3af;">Sort by:</span>
            <select id="sort-select">
                <option value="name">Table Name</option>
                <option value="count">Row Count</option>
            </select>
        </div>

        <div class="dashboard-grid" id="stats-grid">
            <!-- Dynamic Content -->
        </div>
    </div>

    <script>
        let dashboardData = [];

        async function fetchStats() {
            try {
                const res = await fetch('/api/dashboard/stats');
                const json = await res.json();
                dashboardData = json.data;
                renderDashboard();
                document.getElementById('stats-grid').classList.add('loaded');
            } catch (err) {
                console.error('Fetch error:', err);
            }
        }

        function renderDashboard() {
            const grid = document.getElementById('stats-grid');
            const sortBy = document.getElementById('sort-select').value;

            const sortedData = [...dashboardData].sort((a, b) => {
                if (sortBy === 'count') return b.count - a.count;
                return a.table.localeCompare(b.table);
            });

            grid.innerHTML = sortedData.map(item => `
                <div class="stat-card">
                    <div class="card-header">
                        <span class="table-name">${item.table.replace('_', ' ')}</span>
                        <span class="pulse"></span>
                    </div>
                    <div class="row-count">${item.count}</div>
                    <div class="card-footer">
                        Rows active in ecosystem
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('sort-select').addEventListener('change', renderDashboard);
        fetchStats();
        setInterval(fetchStats, 30000); // Auto refresh every 30s
    </script>
</body>
</html>
